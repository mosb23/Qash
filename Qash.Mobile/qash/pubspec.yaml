name: qash
description: Qash mobile application.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.11.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.6.1

  # Routing
  go_router: ^16.0.0

  # Networking
  dio: ^5.9.0

  # Secure Storage
  flutter_secure_storage: ^9.2.4

  # Local Storage
  shared_preferences: ^2.5.3

  # Environment
  flutter_dotenv: ^5.2.1

  # SVG
  flutter_svg: ^2.2.0

  # Intl
  intl: ^0.20.2

  # Icons
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  # Code Generation
  build_runner: ^2.5.4
  freezed: ^3.2.0
  json_serializable: ^6.11.0

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/icons/
